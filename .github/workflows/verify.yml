name: Verify Detsched Patch

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verify-go-1-26:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bootstrap Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Verify patch applies and demos pass
        run: |
          chmod +x scripts/*.sh
          ./scripts/build.sh --go-tag go1.26.0 --no-install
