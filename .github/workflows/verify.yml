name: Verify Detsched Patch

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verify-go-1-26:
    runs-on: blacksmith-16vcpu-ubuntu-2404
    env:
      GO_DETSCHED_WORKDIR: ${{ github.workspace }}/.go-detsched-work
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bootstrap Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Build patched toolchain
        run: |
          chmod +x scripts/*.sh
          ./scripts/build.sh --go-tag go1.26.0 --no-install --no-verify --workdir "$GO_DETSCHED_WORKDIR"
          chmod +x "$GO_DETSCHED_WORKDIR/go-src/misc/detscheddemo/"*.sh

      - name: Run seed demo
        run: |
          "$GO_DETSCHED_WORKDIR/go-src/misc/detscheddemo/run_seed_demo.sh" 12345 99999

      - name: Run stress demo
        run: |
          "$GO_DETSCHED_WORKDIR/go-src/misc/detscheddemo/run_stress_demo.sh" 12345 99999 256 3000

      - name: Run synctest demo
        run: |
          "$GO_DETSCHED_WORKDIR/go-src/misc/detscheddemo/run_synctest_demo.sh" 12345 99999

      - name: Run scheduler fuzzer race demo
        run: |
          DEMO="$GO_DETSCHED_WORKDIR/go-src/misc/detscheddemo/run_fuzz_race_demo.sh"
          if [[ -x "$DEMO" ]]; then
            "$DEMO" 1 80 3000 8 24
          else
            echo "Skipping fuzzer race demo: script not present in applied patch artifact."
          fi
